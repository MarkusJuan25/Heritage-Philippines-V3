# Heritage Philippines V3 — Phase 1 CI quality gate.
#
# Runs the repository's existing formatting, lint, type-check, and build
# commands on every pull request and every push to main. This is the Phase 1
# "CI basics" checklist item (docs/HERITAGE_V3_TASK_BOARD.md). It
# intentionally does not deploy anywhere, touch secrets, or reach any
# external service — see docs/HERITAGE_V3_ENVIRONMENT_CONFIGURATION.md
# Section 12 for the CI/CD secret-handling standard a future deployment job
# must follow.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Matches the "packageManager" field in package.json.
          version: 11.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Matches the "engines.node" floor (">=24.0.0") in package.json
          # and ADR-001's "Node.js active LTS" requirement.
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
